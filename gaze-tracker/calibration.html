<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGazer — Kalibrasyon</title>
  <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.0/dist/webgazer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Info bar ── */
    #info-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 15px;
      z-index: 9999;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    #info-bar b { color: #ffcc00; }
    #progress-text { color: #88ff88; font-weight: bold; }

    /* ── Calibration buttons ── */
    .cal-btn {
      position: fixed;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ff4444;
      border: 3px solid #cc0000;
      cursor: pointer;
      z-index: 500;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, background 0.3s ease, opacity 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(255, 68, 68, 0.6);
    }
    .cal-btn:hover:not(:disabled) {
      transform: translate(-50%, -50%) scale(1.35);
      box-shadow: 0 0 20px rgba(255, 68, 68, 0.9);
    }
    .cal-btn:active:not(:disabled) {
      transform: translate(-50%, -50%) scale(0.9);
    }
    .cal-btn.filling {
      background: #ff8800;
      border-color: #cc6600;
      box-shadow: 0 0 16px rgba(255, 136, 0, 0.8);
    }
    .cal-btn.done {
      background: #22cc44;
      border-color: #119922;
      box-shadow: 0 0 16px rgba(34, 204, 68, 0.7);
      cursor: default;
      pointer-events: none;
      opacity: 0.6;
    }

    /* ── Completion overlay ── */
    #done-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 9998;
      align-items: center;
      justify-content: center;
    }
    #done-overlay.visible { display: flex; }
    #done-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.28);
      max-width: 420px;
    }
    #done-card .icon { font-size: 56px; margin-bottom: 12px; }
    #done-card h2 { font-size: 26px; color: #22aa44; margin-bottom: 8px; }
    #done-card p  { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.6; }
    #done-card .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    #done-card button {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #done-card button:hover { opacity: 0.85; }
    #btn-go-app  { background: #4a90e2; color: #fff; }
    #btn-redo    { background: #eee; color: #333; }

    /* ── Error message ── */
    #error-msg {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #cc2222;
      color: #fff;
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 13px;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="info-bar">
    Her kırmızı noktaya <b>bakın</b> ve üzerine <b>5 kez tıklayın</b> &nbsp;|&nbsp;
    Tamamlanan: <span id="progress-text">0 / 9</span>
  </div>

  <div id="error-msg">Kamera erişimi reddedildi. Lütfen sayfayı yenileyin ve kameraya izin verin.</div>

  <!-- Completion overlay -->
  <div id="done-overlay">
    <div id="done-card">
      <div class="icon">✅</div>
      <h2>Kalibrasyon Tamamlandı!</h2>
      <p>
        9 noktadan toplam 45 tıklama kaydedildi.<br>
        Kalibrasyon verisi saklandı.<br>
        Artık ana uygulamaya dönebilirsiniz.
      </p>
      <div class="btn-row">
        <button id="btn-go-app" onclick="goToApp()">→ Uygulamaya Dön</button>
        <button id="btn-redo"   onclick="redoCalibration()">↺ Tekrar Kalibre Et</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────────────
    const MAX_CLICKS  = 5;
    const TOTAL_POINTS = 9;

    // 9-point grid positions (% of viewport) — same layout as demo
    const POINT_POSITIONS = [
      { left: '5%',  top: '5%'  },   // 0 top-left
      { left: '50%', top: '5%'  },   // 1 top-center
      { left: '95%', top: '5%'  },   // 2 top-right
      { left: '5%',  top: '50%' },   // 3 mid-left
      { left: '50%', top: '50%' },   // 4 center
      { left: '95%', top: '50%' },   // 5 mid-right
      { left: '5%',  top: '95%' },   // 6 bottom-left
      { left: '50%', top: '95%' },   // 7 bottom-center
      { left: '95%', top: '95%' },   // 8 bottom-right
    ];

    const clickCounts = new Array(TOTAL_POINTS).fill(0);
    let completedPoints = 0;

    // ── Build calibration buttons ───────────────────────────────────
    POINT_POSITIONS.forEach((pos, i) => {
      const btn = document.createElement('button');
      btn.className = 'cal-btn';
      btn.id = 'cal-' + i;
      btn.textContent = MAX_CLICKS;
      btn.style.left = pos.left;
      btn.style.top  = pos.top;
      btn.addEventListener('click', () => onCalClick(i));
      document.body.appendChild(btn);
    });

    // ── Click handler ───────────────────────────────────────────────
    function onCalClick(index) {
      const btn = document.getElementById('cal-' + index);
      if (!btn || btn.disabled || clickCounts[index] >= MAX_CLICKS) return;

      clickCounts[index]++;
      const count = clickCounts[index];
      const remaining = MAX_CLICKS - count;

      // Record gaze position in WebGazer
      const rect = btn.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;

      if (window.webgazer && typeof webgazer.recordScreenPosition === 'function') {
        webgazer.recordScreenPosition(cx, cy, 'click');
      }

      // Visual feedback
      if (remaining > 0) {
        btn.textContent = remaining;
        btn.classList.add('filling');
        // Pulse effect
        btn.style.transform = 'translate(-50%, -50%) scale(1.2)';
        setTimeout(() => {
          btn.style.transform = 'translate(-50%, -50%) scale(1)';
        }, 120);
      } else {
        // Point fully calibrated
        btn.textContent = '✓';
        btn.classList.remove('filling');
        btn.classList.add('done');
        btn.disabled = true;
        completedPoints++;
        updateProgress();

        if (completedPoints >= TOTAL_POINTS) {
          onAllDone();
        }
      }
    }

    // ── Progress display ────────────────────────────────────────────
    function updateProgress() {
      document.getElementById('progress-text').textContent =
        completedPoints + ' / ' + TOTAL_POINTS;
    }

    // ── All points done ─────────────────────────────────────────────
    function onAllDone() {
      // Save calibration flag — React app reads this from localStorage
      localStorage.setItem('gazeCalibrated', 'true');

      setTimeout(() => {
        document.getElementById('done-overlay').classList.add('visible');
      }, 600);
    }

    // ── Navigation ──────────────────────────────────────────────────
    function goToApp() {
      window.location.href = '/';
    }

    function redoCalibration() {
      // Clear WebGazer data and reload
      localStorage.removeItem('gazeCalibrated');
      if (window.webgazer) {
        try { webgazer.clearData(); } catch (_) {}
      }
      window.location.reload();
    }

    // ── WebGazer initialization — exactly like the demo page ────────
    window.addEventListener('load', function () {
      if (!window.webgazer) {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent =
          'WebGazer yüklenemedi. İnternet bağlantınızı kontrol edin.';
        return;
      }

      webgazer
        .setRegression('ridge')
        .setTracker('mediapipe')
        .setGazeListener(function (data, elapsedTime) {
          // WebGazer'ın kendi tahmin noktası (kırmızı dot) otomatik güncellenir
        })
        .saveDataAcrossSessions(true)
        .begin()
        .catch(function (err) {
          console.error('WebGazer başlatılamadı:', err);
          document.getElementById('error-msg').style.display = 'block';
        });

      // Demo sayfasıyla aynı ayarlar: video göster, kırmızı dot göster, Kalman aktif
      webgazer.showVideoPreview(true);
      webgazer.showPredictionPoints(true);
      webgazer.applyKalmanFilter(true);
    });
  </script>
</body>
</html>
